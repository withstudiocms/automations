name: Run Knip Linter and Report

on:
  workflow_call:
    secrets:
      STUDIOCMS_GIT_BOT_APP_ID:
        description: 'The GitHub App ID for authenticating with the GitHub API'
        required: true
      STUDIOCMS_GIT_BOT_PRIVATE_KEY:
        description: 'The GitHub App Private Key for authenticating with the GitHub API'
        required: true
    inputs:
      pre-knip-cmd:
        type: 'string'
        description: 'The build command to run before running knip'
        required: true

jobs:
  publish:
    if: github.repository_owner == 'withstudiocms'
    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Setup Apollo Git Bot
        id: bot-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.STUDIOCMS_GIT_BOT_APP_ID }}
          private-key: ${{ secrets.STUDIOCMS_GIT_BOT_PRIVATE_KEY }}

      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ steps.bot-token.outputs.token }}

      - name: Install Tools & Dependencies
        uses: withstudiocms/automations/.github/actions/install@main

      - name: Run Pre-Knip Command
        run: ${{ inputs.pre-knip-cmd }}

      - name: Run Knip Linter and Report
        uses: codex-/knip-reporter@438819707021437618b2527e668b0d1e491db05e # v3.0.0